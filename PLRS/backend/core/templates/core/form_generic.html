{% extends 'core/base.html' %}

{% block content %}
<style>
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes shine {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  .form-wrapper {
    animation: fadeInUp 0.5s ease-out;
  }

  .form-card {
    border: none;
    border-radius: 20px;
    background: #fff;
    box-shadow: 0 20px 60px -25px rgba(0,0,0,0.18);
    overflow: hidden;
    position: relative;
  }

  .form-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, #667eea, #764ba2, #f093fb, #667eea);
    background-size: 200% auto;
    animation: shine 4s linear infinite;
  }

  .form-header {
    padding: 2rem 2.5rem 1.25rem;
    border-bottom: 1px solid #f0f1f5;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .form-icon {
    width: 54px;
    height: 54px;
    border-radius: 14px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 1.5rem;
    box-shadow: 0 10px 25px -10px rgba(102,126,234,0.6);
    flex-shrink: 0;
  }

  .form-header h2 {
    font-weight: 700;
    color: #1a2236;
    margin: 0;
    font-size: 1.55rem;
  }
  .form-header .subtitle {
    color: #6b7280;
    font-size: 0.88rem;
    margin-top: 0.2rem;
  }

  .form-body {
    padding: 2rem 2.5rem 2.5rem;
  }

  /* Style the auto-rendered Django form fields */
  .form-body p {
    margin-bottom: 1.25rem;
    display: flex;
    flex-direction: column;
  }

  .form-body label {
    font-weight: 600;
    color: #374151;
    margin-bottom: 0.5rem;
    font-size: 0.92rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .form-body input[type="text"],
  .form-body input[type="email"],
  .form-body input[type="password"],
  .form-body input[type="number"],
  .form-body input[type="url"],
  .form-body input[type="date"],
  .form-body input[type="file"],
  .form-body select,
  .form-body textarea {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    background: #fafbfc;
    color: #1a2236;
    font-size: 0.95rem;
    transition: all 0.25s ease;
    font-family: inherit;
  }

  .form-body input:focus,
  .form-body select:focus,
  .form-body textarea:focus {
    outline: none;
    border-color: #667eea;
    background: #fff;
    box-shadow: 0 0 0 4px rgba(102,126,234,0.12);
  }

  .form-body textarea {
    min-height: 110px;
    resize: vertical;
  }

  .form-body .helptext {
    display: block;
    margin-top: 0.4rem;
    color: #9ca3af;
    font-size: 0.8rem;
  }

  .form-body .errorlist {
    list-style: none;
    padding: 0.5rem 0.85rem;
    margin: 0.4rem 0 0;
    background: #fef2f2;
    border-left: 3px solid #dc2626;
    border-radius: 6px;
    color: #b91c1c;
    font-size: 0.85rem;
  }

  /* Form actions */
  .form-actions {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid #f0f1f5;
    flex-wrap: wrap;
  }

  .btn-save {
    background: linear-gradient(135deg, #667eea, #764ba2);
    border: none;
    color: #fff;
    padding: 0.75rem 1.75rem;
    border-radius: 10px;
    font-weight: 600;
    font-size: 0.95rem;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    box-shadow: 0 8px 20px -8px rgba(102,126,234,0.55);
    transition: all 0.25s ease;
    cursor: pointer;
  }
  .btn-save:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 28px -10px rgba(102,126,234,0.7);
    color: #fff;
  }
  .btn-save:active { transform: translateY(0); }

  .btn-cancel {
    background: #fff;
    border: 1.5px solid #e5e7eb;
    color: #6b7280;
    padding: 0.75rem 1.5rem;
    border-radius: 10px;
    font-weight: 600;
    font-size: 0.95rem;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    transition: all 0.25s ease;
  }
  .btn-cancel:hover {
    border-color: #1a2236;
    color: #1a2236;
    background: #f9fafb;
  }

  .form-hint {
    margin-left: auto;
    color: #9ca3af;
    font-size: 0.8rem;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
  }

  @media (max-width: 575px) {
    .form-header, .form-body { padding-left: 1.5rem; padding-right: 1.5rem; }
    .form-header h2 { font-size: 1.3rem; }
    .form-hint { display: none; }
  }
</style>

<div class="row justify-content-center form-wrapper">
  <div class="col-md-8">
    <div class="card form-card">
      <div class="form-header">
        <div class="form-icon"></div>
        <div>
          <h2>{{ title }}</h2>
          <div class="subtitle">Fill in the details below and click save when you're ready.</div>
        </div>
      </div>

      <div class="form-body">
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}

          <div class="form-actions">
            <button type="submit" class="btn-save">
               Save Changes
            </button>
            <a href="{% url 'admin_dashboard' %}" class="btn-cancel">
              ← Cancel
            </a>
            <span class="form-hint"> Your changes are secure</span>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
